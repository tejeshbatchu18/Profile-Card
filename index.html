<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card</title>

    <link rel="stylesheet" href="style.css"> 

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' 
    rel='stylesheet'
    >

    
</head>
<body>
    <div class="profile-card">
        <div class="image">
            <img src="Tejesh.jpg" alt="tejesh" class="profile-image">
        </div>
        <div class="text-data">
            <span class="name">Tejesh Batchu</span>
            <span class="job">Student at PVPSIT</span>
        </div>
        <div class="media-button">
            <a href="https://www.instagram.com/tejeshh18/" style="background: #e1306c;" class="link">
                <i class='bx bxl-instagram'></i>  
            </a>

            <a href="#" style="background: #4267b2;" class="link">
                <i class='bx bxl-linkedin-square'></i> 
            </a>

            <a href="#" style="background: #ea0909;" class="link">
                <i class='bx bxl-youtube'></i>   
            </a>

            <a href="#" style="background: rgba(8, 232, 75, 0.909);" class="link">
                <i class='bx bxl-whatsapp'></i>   
            </a>
        </div>
        <div class="buttons">
            <button class="button">Connect</button>
            <button class="button">Follow</button>
        </div>
        <div class="analytics">
            <div class="data"></div>
        </div>
    </div>
</body>
</html>
